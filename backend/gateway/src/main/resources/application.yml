server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: attendance-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/attendance/**,/api/v1/timesheets/**,/api/v1/leaves/**
        - id: admin-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/admin/**
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/notifications/**
        - id: report-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/dashboard/**,/api/v1/reports/**
        - id: ai-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/ai/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    tags:
      application: ${spring.application.name}

jwt:
  secret: ${JWT_SECRET:myLocalDevSecretKeyThatIsAtLeast256BitsLong1234567890}

logging:
  level:
    org.springframework.cloud.gateway: INFO
