spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: attendance-service
          uri: http://attendance-service:8082
          predicates:
            - Path=/api/v1/attendance/**,/api/v1/timesheets/**,/api/v1/leaves/**
        - id: admin-service
          uri: http://admin-service:8083
          predicates:
            - Path=/api/v1/admin/**
        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/api/v1/notifications/**
        - id: report-service
          uri: http://report-service:8085
          predicates:
            - Path=/api/v1/dashboard/**,/api/v1/reports/**
        - id: ai-service
          uri: http://ai-service:8086
          predicates:
            - Path=/api/v1/ai/**

jwt:
  secret: ${JWT_SECRET}
